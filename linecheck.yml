# yaml-language-server: $schema=https://raw.githubusercontent.com/tupe12334/linecheck/main/schema/linecheck.schema.json

rules:
  - pattern: "tests/**/*.rs"
    warn: 100
    error: 200
  - pattern: "**/*.rs"
    warn: 50
    error: 50
    error_message: "Please split up the file according to domain responsibility"

exclude:
  - "target/**"
  - "node_modules/**"
  - "Cargo.lock"
  - "pnpm-lock.yaml"
