name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown,wasm32-wasip1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --fail-under-lines 100 --summary-only

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build wasm bindings
        run: cargo build -p linecheck-wasm --target wasm32-unknown-unknown --release

      - name: Clippy wasm bindings
        run: cargo clippy -p linecheck-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings

      - name: Build wasi bindings
        run: cargo build -p linecheck-wasm-wasi --target wasm32-wasip1 --release

      - name: Clippy wasi bindings
        run: cargo clippy -p linecheck-wasm-wasi --target wasm32-wasip1 --all-targets -- -D warnings

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go example smoke test
        run: go run .
        working-directory: examples/go

      - name: Build WASI CLI (npm `linecheck` bin)
        run: cargo build --release --target wasm32-wasip1 --bin linecheck

      - name: Self-check WASI CLI via Node
        run: |
          mkdir -p /tmp/linecheck-wasi-smoke/bin
          cp target/wasm32-wasip1/release/linecheck.wasm /tmp/linecheck-wasi-smoke/linecheck-cli.wasm
          cp npm/linecheck/bin/cli.js /tmp/linecheck-wasi-smoke/bin/cli.js
          node /tmp/linecheck-wasi-smoke/bin/cli.js .

      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D missing_docs"

      - name: Self-check
        run: cargo run -- .
